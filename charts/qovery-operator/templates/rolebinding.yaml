{{- if .Values.rbac.create -}}
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/{{ .Values.rbac.apiVersion }}
metadata:
  name: {{ include "qovery-operator.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "qovery-operator.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "qovery-operator.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: {{ include "qovery-operator.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
