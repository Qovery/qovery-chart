{{- if .Values.k8sDeployApiGateway }}
---
# Allow cluster Gateway to reference wildcard certificate in cert-manager namespace
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gateway-to-cert-manager-secrets
  namespace: {{ .Values.namespace }}
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: Gateway
    namespace: qovery
  to:
  - group: ""
    kind: Secret
    name: letsencrypt-acme-qovery-cert
{{- end }}
