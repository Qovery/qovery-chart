apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-qovery
  namespace: {{ .Values.namespace }}
spec:
  acme:
    server: {{ .Values.acme.letsEncrypt.acmeUrl }}
    email: {{ .Values.acme.letsEncrypt.emailReport }}
    skipTLSVerify: {{ .Values.acme.letsEncrypt.skipTLSVerify }}

    # Name of a secret used to store the ACME account private key
    privateKeySecretRef:
      name: letsencrypt-acme-priv-key

    # https://cert-manager.io/docs/configuration/acme/
    solvers:
      # Activate gateway-api solver only if gateway-api is default
      {{- if and (eq .Values.k8sUseApiGateway true) (eq .Values.k8sDeployApiGateway true) }}
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: qovery-cluster-public-gateway
                namespace: qovery
                kind: Gateway
      {{- end }}
      {{- if and (ne .Values.k8sUseApiGateway true) (ne .Values.k8sRemoveNginx true) }}
      - http01:
          ingress:
            class: nginx-qovery
            ingressTemplate:
              metadata:
                annotations:
                  nginx.ingress.kubernetes.io/whitelist-source-range: "0.0.0.0/0, ::/0"
      {{- end }}
      - dns01:
          {{ if eq .Values.externalDnsProvider "cloudflare" }}
          cloudflare:
            email: {{ .Values.provider.cloudflare.email }}
            apiTokenSecretRef:
              name: {{ .Values.externalDnsProvider }}-api-token-secret
              key: apiToken
          {{ end }}
          {{ if eq .Values.externalDnsProvider "pdns" }}
          webhook:
            groupName: acme.qovery.com
            solverName: qovery
            config:
              # Only needed if you don't have default credentials as seen above.
              apiKeySecretRef:
                key: apiKey
                name: {{ .Values.externalDnsProvider }}-api-token-secret
              apiUrlSecretRef:
                key: apiUrl
                name: {{ .Values.externalDnsProvider }}-api-token-secret
              apiPortSecretRef:
                key: apiPort
                name: {{ .Values.externalDnsProvider }}-api-token-secret
          {{ end }}
          {{ if eq .Values.externalDnsProvider "route53" }}
          route53:
            region: {{ .Values.provider.route53.region }}
            {{ if .Values.provider.route53.hostedZoneId }}
            hostedZoneID: {{ .Values.provider.route53.hostedZoneId }}
            {{ end }}
            accessKeyID: {{ .Values.provider.route53.accessKeyId }}
            secretAccessKeySecretRef:
              name: {{ .Values.externalDnsProvider }}-api-token-secret
              key: secretAccessKey
          {{ end }}
        selector:
          dnsZones:
            {{- range .Values.managedDns }}
            - "{{ . }}"
            {{- end }}
