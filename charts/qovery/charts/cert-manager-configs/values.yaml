# Supported providers: cloudflare
externalDnsProvider: ""

# List of wildcard DNS to support
managedDns: []

# Namespace where it should be deployed
namespace: "cert-manager"

clusterRole:
  install: false
webhookRole:
  install: false

# Required provider info for ACME DNS challenge
provider:
  cloudflare:
    apiToken: ""
    email: ""
  pdns:
    apiKey: ""
    apiUrl: ""
    apiPort: ""

# Let's encrypt info
acme:
  letsEncrypt:
    emailReport: ""
    acmeUrl: ""
    skipTLSVerify: false

# Gateway API deployment flag
k8sDeployApiGateway: false

# Nginx removal flag
k8sRemoveNginx: false

userProvidedCertificate:
  crt: ""
  key: ""
