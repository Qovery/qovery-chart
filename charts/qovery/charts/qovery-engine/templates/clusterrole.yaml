{{- if and .Values.rbac.create .Values.rbac.clusterRole }}
apiVersion: rbac.authorization.k8s.io/{{ .Values.rbac.apiVersion }}
kind: ClusterRole
metadata:
  name: {{ include "qovery-engine.fullname" . }}
  labels:
    {{- include "qovery-engine.labels" . | nindent 4 }}
rules:
{{- if eq .Values.rbac.clusterPermission "admin" }}
  - apiGroups:
      - '*'
    resources:
      - '*'
    verbs:
      - '*'
  - nonResourceURLs:
      - '*'
    verbs:
      - '*'
{{- else if eq .Values.rbac.clusterPermission "blueprint" }}
  # Blueprint engine only reads deployed services' terraform state secrets to compute previews.
  # Preview plans run with -lock=false, so no lease or secret-write access is needed.
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
{{- else if eq .Values.rbac.clusterPermission "deployer" }}
  - apiGroups:
      - ""
      - apps
    resources:
      - pods
      - pods/log
      - pods/exec
      - deployments
      - configmaps
    verbs:
      - create
      - delete
      - update
      - patch
      - get
      - list
      - watch
{{- else }}
    # empty
{{- end }}
{{- end }}
