{{- if .Values.workerServiceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "qovery-operator.workerServiceAccountName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "qovery-operator.labels" . | nindent 4 }}
  {{- with .Values.workerServiceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.workerServiceAccount.automountServiceAccountToken }}
{{- end }}
