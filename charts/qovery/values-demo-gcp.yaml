services:
  qovery:
    qovery-cluster-agent:
      enabled: true
    qovery-shell-agent:
      enabled: true
    qovery-operator:
      enabled: true
    qovery-engine:
      enabled: true
    qovery-priority-class:
      enabled: true
  ingress:
    ingress-nginx:
      enabled: true
  dns:
    external-dns:
      enabled: true
  logging:
    loki:
      enabled: true
    alloy:
      enabled: true
  certificates:
    cert-manager:
      enabled: true
    cert-manager-configs:
      enabled: true
    qovery-cert-manager-webhook:
      enabled: true
  observability: {}
  aws:
    q-storageclass-aws:
      enabled: false
    aws-ebs-csi-driver:
      enabled: false
    aws-load-balancer-controller:
      enabled: false
  gcp:
    q-storageclass-gcp:
      enabled: true
  scaleway:
    q-storageclass-scaleway:
      enabled: false
  azure:
    q-storageclass-azure:
      enabled: false
qovery:
  clusterId: &clusterId set-by-customer
  clusterShortId: &clusterShortId set-by-customer
  organizationId: &organizationId set-by-customer
  jwtToken: &jwtToken set-by-customer
  rootDomain: &rootDomain set-by-customer
  domain: &domain set-by-customer
  domainWildcard: &domainWildcard set-by-customer
  qoveryDnsUrl: &qoveryDnsUrl set-by-customer
  agentGatewayUrl: &agentGatewayUrl set-by-customer
  engineGatewayUrl: &engineGatewayUrl set-by-customer
  lokiUrl: &lokiUrl set-by-customer
  promtailLokiUrl: &promtailLokiUrl set-by-customer
  acmeEmailAddr: &acmeEmailAddr set-by-customer
  externalDnsPrefix: &externalDnsPrefix set-by-customer
  architectures: &architectures set-by-customer
  engineVersion: &engineVersion set-by-customer
  shellAgentVersion: &shellAgentVersion set-by-customer
  clusterAgentVersion: &clusterAgentVersion set-by-customer
  operatorVersion: &operatorVersion set-by-customer
qovery-cluster-agent:
  fullnameOverride: qovery-shell-agent
  image:
    tag: *clusterAgentVersion
  environmentVariables:
    CLUSTER_ID: *clusterId
    CLUSTER_JWT_TOKEN: *jwtToken
    GRPC_SERVER: *agentGatewayUrl
    LOKI_URL: *lokiUrl
    ORGANIZATION_ID: *organizationId
  useSelfSignCertificate: true
qovery-shell-agent:
  fullnameOverride: qovery-shell-agent
  image:
    tag: *shellAgentVersion
  environmentVariables:
    CLUSTER_ID: *clusterId
    CLUSTER_JWT_TOKEN: *jwtToken
    GRPC_SERVER: *agentGatewayUrl
    ORGANIZATION_ID: *organizationId
qovery-operator:
  fullnameOverride: qovery-operator
  image:
    tag: *operatorVersion
  environmentVariables:
    CLUSTER_ID: *clusterId
    CLUSTER_JWT_TOKEN: *jwtToken
    GRPC_SERVER: *engineGatewayUrl
    ORGANIZATION_ID: *organizationId
qovery-engine:
  image:
    tag: *engineVersion
  engineResources: null
  buildContainer:
    environmentVariables:
      BUILDER_CPU_ARCHITECTURES: *architectures
      BUILDER_ROOTLESS_ENABLED: 'true'
  environmentVariables:
    CLUSTER_ID: *clusterId
    CLUSTER_JWT_TOKEN: *jwtToken
    DOCKER_HOST: tcp://0.0.0.0:2375
    GRPC_SERVER: *engineGatewayUrl
    LIB_ROOT_DIR: /home/qovery/lib
    ORGANIZATION_ID: *organizationId
ingress-nginx:
  controller:
    useComponentLabel: true
    admissionWebhooks:
      enabled: true # set-by-customer
    allowSnippetAnnotations: true
    replicaCount: 1 # set-by-customer
    # enable if you want metrics scrapped by prometheus
    metrics:
      enabled: true # set-by-customer
      serviceMonitor:
        enabled: false # set-by-customer
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "nginx_ingress_controller_.*"
            targetLabel: host
            replacement: ""
          - sourceLabels: [__name__]
            regex: "nginx_ingress_controller_.*"
            targetLabel: exported_namespace
            replacement: ""
          - sourceLabels: [__name__]
            regex: "nginx_ingress_controller_.*"
            targetLabel: exported_service
            replacement: ""
    config:
      # set global default file size limit to 100m
      proxy-body-size: 100m
      # hide Nginx version
      server-tokens: "false"
      # annotation risk level - needed because of nginx.ingress.kubernetes.io/configuration-snippet in ingress configuration
      annotations-risk-level: "Critical"
      # enable real IP (client IP)
      enable-real-ip: "false" # set-by-customer
      # passes the incoming X-Forwarded-* headers to upstreams
      use-forwarded-headers: "false" # set-by-customer
      # append the remote address to the X-Forwarded-For header instead of replacing it
      compute-full-forwarded-for: "false" # set-by-customer
      # customize http-snippet
      http-snippet: |
          # Qovery: declare variables with safe defaults
          map $host $qovery_com_associated_service_id  { default ""; }
          map $host $qovery_com_environment_id         { default ""; }
      # customize log-format / set-by-customer
      # default format can be found in the template: https://github.com/nginxinc/kubernetes-ingress/blob/v3.5.2/internal/configs/version1/nginx.tmpl#L44
      # nginx_controller_log_format_upstream can be a json that why we pass it in the value file
      log-format-escaping-json: "true"
      log-format-escaping-none: "false" # set-by-customer
      limit-req-status-code: "503" # set-by-customer
      # Compression configuration (enabled by default)
      enable-brotli: "true"
      brotli-level: "6"
      brotli-types: "text/xml text/yaml image/svg+xml application/x-font-ttf image/vnd.microsoft.icon application/x-font-opentype application/json font/eot application/vnd.ms-fontobject application/javascript font/otf application/xml application/xhtml+xml text/javascript application/x-javascript text/plain application/x-font-truetype application/xml+rss image/x-icon font/opentype text/css image/x-win-bitmap"
      use-gzip: "true"
      gzip-level: "6"
      gzip-types: "text/xml text/yaml image/svg+xml application/x-font-ttf image/vnd.microsoft.icon application/x-font-opentype application/json font/eot application/vnd.ms-fontobject application/javascript font/otf application/xml application/xhtml+xml text/javascript application/x-javascript text/plain application/x-font-truetype application/xml+rss image/x-icon font/opentype text/css image/x-win-bitmap"
    # PDB
    maxUnavailable: 20%
    ingressClassResource:
      # -- Name of the IngressClass
      name: nginx-qovery
      # -- Create the IngressClass or not
      enabled: true
    # the Ingress Class name to be used by Ingresses (use "nginx-qovery" for Qovery application/container deployments)
    ingressClass: nginx-qovery
    extraArgs:
      # Kubernetes path of the default Cert-manager TLS certificate (if used)
      default-ssl-certificate: "qovery/letsencrypt-acme-qovery-cert"
    updateStrategy:
      rollingUpdate:
        # set the minimum acceptable number of unavailable pods during a rolling update
        maxSurge: 1
        maxUnavailable: 0
    readinessProbe:
      initialDelaySeconds: 15
    # enable auoscaling if you want to scale the number of replicas based on CPU usage
    autoscaling:
      enabled: false # set-by-customer
      minReplicas: 2 # set-by-customer
      maxReplicas: 25 # set-by-customer
      targetCPUUtilizationPercentage: 50 # set-by-customer
    # required if you rely on a load balancer
    # the controller mirrors the address of this service's endpoints to the load-balancer status of all Ingress objects it satisfies.
    publishService:
      enabled: true
    # set a load balancer if you want your Nginx to be publicly accessible
    service:
      enabled: true
      annotations:
        # Qovery managed DNS requires *.$domain (something like: *.<cluster_id>.<given_dns_name>)
        external-dns.alpha.kubernetes.io/hostname: *domainWildcard
      externalTrafficPolicy: "Local"
      sessionAffinity: ""
      healthCheckNodePort: 0
    # force a connection for 30 seconds before shutting down, to avoid exiting too early
    # and let time to AWS LB to catchup change in the topology
    # When /wait-shutdown is called, the LB healthcheck /healthz endpoint return an error, but nginx keep processing request
    lifecycle:
      preStop:
        exec:
          command:
            - sh
            - -c
            - (sleep 30 | nc localhost 80)&  sleep 1 ; /wait-shutdown
    topologySpreadConstraints:
      # Spread across availability zones for better high availability
      - labelSelector:
          matchLabels:
            app.kubernetes.io/instance: nginx-ingress
            app.kubernetes.io/component: controller
        topologyKey: topology.kubernetes.io/zone
        maxSkew: 1
        whenUnsatisfiable: ScheduleAnyway
      # Spread across nodes within zones (best-effort, won't block scheduling)
      - labelSelector:
          matchLabels:
            app.kubernetes.io/instance: nginx-ingress
            app.kubernetes.io/component: controller
        topologyKey: kubernetes.io/hostname
        maxSkew: 2
        whenUnsatisfiable: ScheduleAnyway
  
external-dns:
  fullnameOverride: external-dns
  # We have only 1 instance of external-dns, so creating pdb benefits nothing and may create unnecessary constraints
  # i.e: Karpenter will take them into account
  pdb:
    create: false
  # Make external DNS ignore this ingress https://github.com/kubernetes-sigs/external-dns/issues/1910#issuecomment-976371247
  annotationFilter: "external-dns.alpha.kubernetes.io/exclude notin (true)"
  # set domainFilters to the domain you want to manage
  domainFilters: [*rootDomain]
  triggerLoopOnEvent: true
  policy: sync
  # avoid dns collision with other external-dns instances
  txtOwnerId: *clusterShortId
  txtPrefix: *externalDnsPrefix
  # set the number of replicas you want to use
  replicas: 1
  # set the rolling update strategy you want to apply
  updateStrategy:
    type: RollingUpdate
  # remove if you don't want to use a custom image
  image:
    repository: public.ecr.aws/r3m4q3r9/pub-mirror-external-dns
  # set the provider to use (pdns for Qovery DNS demo)
  provider:
    name: pdns
  # Configure PDNS provider
  # pdns-server: environment variable with port concatenation
  # pdns-api-key: environment variable containing the API key
  extraArgs:
    pdns-server: "$(QOVERY_DNS_URL):443"
    pdns-api-key: "$(PDNS_API_KEY)"
  # Environment variables reference YAML anchors from values.yaml qovery: section
  env:
    - name: QOVERY_DNS_URL
      value: *qoveryDnsUrl
    - name: PDNS_API_KEY
      value: *jwtToken
  # set resources
  resources:
    limits:
      cpu: 50m
      memory: 100Mi
    requests:
      cpu: 50m
      memory: 100Mi
  
alloy:
  fullnameOverride: alloy
  namespace: qovery
  controller:
    type: daemonset
    priorityClassName: qovery-high-priority
    # for daemonsets, rolling update with maxUnavailable 35%
    # prevents alloy from timing out when updating large clusters (many nodes)
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 35%
    # backs alloy.storagePath (loki.source.file positions). emptyDir, not hostPath, so this generic
    # self-managed default also works on GKE Autopilot (autogke-no-write-mode-hostpath denies any
    # writable hostPath). Tradeoff: positions are lost on pod reschedule -> re-tail = possible
    # duplicate logs. BYOK clusters on standard nodes may override this with a hostPath for durable
    # positions across pod recreation.
    volumes:
      extra:
        - name: alloy-data
          emptyDir: {}
  # disable the prometheus-config-reloader sidecar to match the previous promtail footprint
  # (promtail ran with sidecar.configReloader.enabled=false): saves 10m cpu + 50Mi mem requested
  # per node. alloy.configMap.content is rendered into a chart-created ConfigMap, so with the
  # reloader off the chart stamps a checksum/config pod annotation and rolls the DaemonSet
  # automatically on config change instead of hot-reloading.
  configReloader:
    enabled: false
  alloy:
    clustering:
      enabled: false
    # writable positions dir, backed by the emptyDir in controller.volumes.extra (a hostPath here
    # would be rejected on GKE Autopilot). Positions survive container restarts but not pod reschedule.
    storagePath: /var/lib/alloy/data
    # disable anonymous usage reporting to grafana.com (privacy + airgapped clusters block the egress)
    enableReporting: false
    # mount /var/log (read-only hostPath, allowed on Autopilot) so the DaemonSet can tail /var/log/pods
    mounts:
      varlog: true
      # back storagePath with the emptyDir volume declared in controller.volumes.extra
      extra:
        - name: alloy-data
          mountPath: /var/lib/alloy/data
    extraEnv:
      # [0] node scoping for discovery.kubernetes
      - name: NODE_NAME
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName
      # [1] loki push URL — provided by the BYOK global config anchor
      - name: LOKI_WRITE_URL
        value: *promtailLokiUrl
    configMap:
      content: |-
        // ===== file-tailing scaffolding =====
        discovery.kubernetes "pods" {
          role = "pod"
          // DaemonSet: only this node's pods (NODE_NAME injected via extraEnv fieldRef spec.nodeName)
          selectors {
            role  = "pod"
            field = "spec.nodeName=" + sys.env("NODE_NAME")
          }
        }
        discovery.relabel "pods" {
          targets = discovery.kubernetes.pods.targets
          // strip the replicaset/deployment hash to get a stable controller name (used by `app` below)
          rule {
            source_labels = ["__meta_kubernetes_pod_controller_name"]
            regex         = "([0-9a-z-.]+?)(-[0-9a-f]{8,10})?"
            target_label  = "__tmp_controller_name"
            action        = "replace"
          }
          // app: first non-empty of app.kubernetes.io/name, app, controller, pod name
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name", "__meta_kubernetes_pod_label_app", "__tmp_controller_name", "__meta_kubernetes_pod_name"]
            regex         = "^;*([^;]+)(;.*)?$"
            target_label  = "app"
            action        = "replace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node_name"
            action        = "replace"
          }
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
            action        = "replace"
          }
          // job = <namespace>/<app>
          rule {
            source_labels = ["namespace", "app"]
            separator     = "/"
            replacement   = "$1"
            target_label  = "job"
            action        = "replace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
            action        = "replace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
            action        = "replace"
          }
          // build the on-node log file path
          rule {
            source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
            separator     = "/"
            replacement   = "/var/log/pods/*$1/*.log"
            target_label  = "__path__"
            action        = "replace"
          }
          // static pods: derive __path__ from the kubernetes.io/config.hash annotation
          rule {
            source_labels = ["__meta_kubernetes_pod_annotationpresent_kubernetes_io_config_hash", "__meta_kubernetes_pod_annotation_kubernetes_io_config_hash", "__meta_kubernetes_pod_container_name"]
            regex         = "true/(.*)"
            separator     = "/"
            replacement   = "/var/log/pods/*$1/*.log"
            target_label  = "__path__"
            action        = "replace"
          }
          // REQUIRED by cluster-agent: keep qovery_com_* pod labels on the log stream
          rule {
            action      = "labelmap"
            regex       = "__meta_kubernetes_pod_label_(qovery_com_service_id|qovery_com_service_type|qovery_com_environment_id)"
            replacement = "$1"
          }
        }
        local.file_match "pods" {
          path_targets = discovery.relabel.pods.output
        }
        loki.source.file "pods" {
          targets    = local.file_match.pods.targets
          forward_to = [loki.process.qovery.receiver]
        }
        // ===== the pipeline (1:1 from promtail pipelineStages) =====
        loki.process "qovery" {
          stage.cri {}
          // drop the Alloy-added filename label (redundant w/ namespace/pod/container, high-cardinality)
          stage.label_drop {
            values = ["filename"]
          }
          // SPECIAL: nginx-ingress enrichment
          stage.match {
            selector = "{namespace=\"nginx-ingress\", container=\"controller\"}"
            stage.json {
              expressions = {
                qovery_com_associated_service_id = "qovery_com_associated_service_id",
                qovery_com_environment_id        = "qovery_com_environment_id",
              }
            }
            stage.labels {
              values = { qovery_com_associated_service_id = "", qovery_com_environment_id = "" }
            }
          }
          // SPECIAL: gateway-api / envoy enrichment
          stage.match {
            selector = "{namespace=\"qovery\", container=\"envoy\"}"
            stage.json {
              expressions = {
                qovery_com_associated_service_id = "qovery_com_associated_service_id",
                qovery_com_environment_id        = "qovery_com_environment_id",
              }
            }
            stage.labels {
              values = { qovery_com_associated_service_id = "", qovery_com_environment_id = "" }
            }
          }
          // k8s-event-logger enrichment
          stage.match {
            selector = "{app=\"k8s-event-logger\"}"
            stage.json {
              expressions = {
                reason                = "reason",
                type                  = "type",
                kind                  = "kind",
                event_namespace       = "namespace",
                qovery_project_id     = "qovery_project_id",
                qovery_environment_id = "qovery_environment_id",
                qovery_service_id     = "qovery_service_id",
                timestamp             = "timestamp",
              }
            }
            stage.labels {
              values = {
                reason = "", type = "", kind = "",
                qovery_project_id = "", qovery_environment_id = "", qovery_service_id = "",
              }
            }
            stage.timestamp {
              source = "timestamp"
              format = "Unix"
            }
          }
          // STAGE 1: level from JSON `level`
          stage.json {
            expressions = { level = "level" }
          }
          stage.labels { values = { level = "" } }
          // fallback: JSON `severity`
          stage.match {
            selector = "{level=\"\"}"
            stage.json {
              expressions = { level = "severity" }
            }
            stage.labels { values = { level = "" } }
          }
          // STAGE 2: structured text "TIMESTAMP LEVEL"
          stage.match {
            selector = "{level=\"\"}"
            stage.decolorize {}
            stage.regex {
              expression = "^\\s*(?:\\d{9,}\\s+)?\\d{4}-\\d{2}-\\d{2}T[\\d:.\\-]+(?:Z|[+-]\\d{2}:\\d{2})?(?:\\s+\\d{4}-\\d{2}-\\d{2}T[\\d:.\\-]+(?:Z|[+-]\\d{2}:\\d{2})?)?\\s+(?P<level>TRACE|VERBOSE|DEBUG|LOG|INFO|NOTICE|WARN(?:ING)?|ERROR|ERR|CRIT(?:ICAL)?|FATAL|PANIC)\\b"
            }
            stage.labels { values = { level = "" } }
          }
          // STAGE 3: generic structured text
          stage.match {
            selector = "{level=\"\"}"
            stage.decolorize {}
            stage.regex {
              expression = "^\\s*(?:\\[[^\\]]+\\]\\s+\\d+\\s+-\\s+)?(?:\\d{1,4}[/-]\\d{1,2}[/-]\\d{1,4}(?:,\\s+|\\s+)\\d{1,2}:\\d{2}:\\d{2}(?:[.,]\\d+)?(?:\\s+(?:AM|PM))?\\s+)?\\[?(?P<level>TRACE|VERBOSE|DEBUG|LOG|INFO|NOTICE|WARN(?:ING)?|ERROR|ERR|CRIT(?:ICAL)?|FATAL|PANIC)\\]?\\b"
            }
            stage.labels { values = { level = "" } }
          }
          // STAGE 4: key=value / key:value
          stage.match {
            selector = "{level=\"\"}"
            stage.regex {
              expression = "(?i)\\b(?:level|severity)[:=]\\s*\"?(?P<level>trace|verbose|debug|log|info|notice|warn(?:ing)?|error|err|crit(?:ical)?|fatal|panic)\"?"
            }
            stage.labels { values = { level = "" } }
          }
          // STAGE 5: normalize lowercase + canonicalize
          stage.template {
            source   = "level"
            template = "set-by-customer"
          }
          stage.replace {
            source     = "level"
            expression = "^(warning)$"
            replace    = "warn"
          }
          stage.replace {
            source     = "level"
            expression = "^(verbose)$"
            replace    = "debug"
          }
          stage.replace {
            source     = "level"
            expression = "^(err)$"
            replace    = "error"
          }
          // STAGE 6: publish level label
          stage.labels { values = { level = "" } }
          // STAGE 7: last resort error-keyword detection
          stage.match {
            selector = "{level=\"\"} |~ \"(?i)\\\\b(emerg|fatal|alert|crit(?:ical)?|err|eror|error|panic|exception)\\\\b\""
            stage.static_labels { values = { level = "error" } }
          }
          forward_to = [loki.write.qovery.receiver]
        }
        loki.write "qovery" {
          endpoint {
            url = sys.env("LOKI_WRITE_URL")
          }
        }
  
loki:
  fullnameOverride: loki
  loki:
    auth_enabled: false
    ingester:
      lifecycler:
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
    schemaConfig:
      configs:
        # set the schema for the index (2020 version can be deleted on a fresh install)
        - from: 2020-05-15
          store: boltdb-shipper
          object_store: set-by-customer
          schema: v11
          index:
            prefix: index_
            period: 24h
        - from: 2022-01-11
          store: boltdb-shipper
          object_store: set-by-customer
          schema: v12
          index:
            prefix: index_
            period: 24h
        - from: 2025-10-14
          store: tsdb
          object_store: set-by-customer
          schema: v13
          index:
            prefix: index_
            period: 24h
  monitoring:
    dashboards:
      enabled: false
    rules:
      enabled: false
    serviceMonitor:
      enabled: false
      metricsInstance:
        enabled: false
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
    grafanaAgent:
      enabled: false
    lokiCanary:
      enabled: false
  test:
    enabled: false
  gateway:
    enabled: false
  deploymentMode: SingleBinary
  singleBinary:
    replicas: 1
    persistence:
      enabled: false
    extraVolumes:
      - name: data
        emptyDir: {}
      - name: storage
        emptyDir: {}
    extraVolumeMounts:
      - name: data
        mountPath: /data
      - name: storage
        mountPath: /var/loki
  
cert-manager:
  fullnameOverride: cert-manager
  global:
    leaderElection:
      namespace: qovery
  installCRDs: true
  replicaCount: 1
  startupapicheck:
    jobAnnotations:
      helm.sh/hook: post-install,post-upgrade
    rbac:
      annotations:
        helm.sh/hook: post-install,post-upgrade
    serviceAccount:
      annotations:
        helm.sh/hook: post-install,post-upgrade
qovery-cert-manager-webhook:
  fullnameOverride: qovery-cert-manager-webhook
  certManager:
    namespace: qovery
    serviceAccountName: cert-manager
  secret:
    apiUrl: *qoveryDnsUrl
    apiKey: *jwtToken
cert-manager-configs:
  fullnameOverride: cert-manager-configs
  externalDnsProvider: pdns # Qovery DNS
  namespace: "qovery"
  managedDns: [*domain]
  acme:
    letsEncrypt:
      emailReport: *acmeEmailAddr
      # set the Let's Encrypt URL
      # Test: https://acme-staging-v02.api.letsencrypt.org/directory
      # Prod: 
      acmeUrl: https://acme-v02.api.letsencrypt.org/directory
  provider:
    pdns:
      apiPort: "443"
      apiUrl: *qoveryDnsUrl
      apiKey: *jwtToken
